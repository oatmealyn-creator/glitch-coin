<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none">
  <defs>
    <linearGradient id="coin-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8455ef"/>
      <stop offset="50%" stop-color="#6b38d4"/>
      <stop offset="100%" stop-color="#4a1f9e"/>
    </linearGradient>
    <linearGradient id="coin-shine" x1="30%" y1="20%" x2="70%" y2="80%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.3)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="clay-shadow">
      <feDropShadow dx="4" dy="8" stdDeviation="12" flood-color="#181934" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Outer ring -->
  <circle cx="128" cy="128" r="118" fill="url(#coin-grad)" filter="url(#clay-shadow)"/>
  <circle cx="128" cy="128" r="118" fill="url(#coin-shine)"/>

  <!-- Inner ring -->
  <circle cx="128" cy="128" r="100" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>

  <!-- Glitch text line 1 (offset, glitch effect) -->
  <text x="129" y="144" font-family="'Plus Jakarta Sans',sans-serif" font-size="28" font-weight="800" fill="#26fedc" opacity="0.4" text-anchor="middle" letter-spacing="6">
    GLITCH
  </text>

  <!-- Glitch text line 2 (main) -->
  <text x="128" y="142" font-family="'Plus Jakarta Sans',sans-serif" font-size="28" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="6">
    GLITCH
  </text>

  <!-- Small glitch fragments -->
  <rect x="90" y="100" width="8" height="2" rx="1" fill="#26fedc" opacity="0.6"/>
  <rect x="152" y="100" width="6" height="2" rx="1" fill="#26fedc" opacity="0.6"/>
  <rect x="100" y="164" width="4" height="2" rx="1" fill="#26fedc" opacity="0.4"/>
  <rect x="148" y="164" width="7" height="2" rx="1" fill="#26fedc" opacity="0.4"/>

  <!-- Bottom decorative line -->
  <line x1="88" y1="172" x2="168" y2="172" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
</svg>
